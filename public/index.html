<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ventas Empanadas — Pastoral de Parejas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9880a; --gold-l:#e8b84b; --gold-d:#a06e00;
  --terracota:#b5451b; --terracota-d:#8c3314; --terracota-l:#e8876a;
  --crema:#fdf5e4; --crema-d:#f0e2c4;
  --dark:#1c1208; --dark-mid:#2e1f0e;
  --verde:#2a6b3c; --verde-l:#3d9657;
  --borde:#dcc89a; --shadow:rgba(28,18,8,0.14);
  --text:#2e1f0e; --text-light:#8a6a40;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',sans-serif;background:var(--crema);color:var(--text);min-height:100vh;}

/* ── LOGIN ── */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(145deg,#0f0905 0%,#1c1208 50%,#2a1a08 100%);
  position:relative;overflow:hidden;
}
/* Logo de fondo difuminado en login */
.login-bg-logo{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:480px;height:480px;opacity:0.07;pointer-events:none;
}
.login-card{
  background:rgba(253,245,228,0.97);border-radius:24px;padding:44px 40px;width:100%;max-width:420px;
  box-shadow:0 28px 70px rgba(0,0,0,0.6);text-align:center;position:relative;z-index:1;
  border:1px solid rgba(201,136,10,0.3);
}
.login-logo-svg{width:80px;height:80px;margin:0 auto 12px;}
.login-titulo{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;color:var(--terracota);line-height:1.1;margin-bottom:4px;}
.login-sub{font-size:0.78rem;color:var(--text-light);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:28px;}
.login-card label{display:block;font-size:0.76rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-light);margin-bottom:6px;text-align:left;}
.login-card select{width:100%;padding:13px 16px;border:1.5px solid var(--borde);border-radius:10px;font-family:'Jost',sans-serif;font-size:1rem;color:var(--dark);background:#fff;outline:none;margin-bottom:20px;cursor:pointer;}
.login-card select:focus{border-color:var(--gold);}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--terracota),var(--terracota-d));color:#fff;border:none;border-radius:10px;font-family:'Jost',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;letter-spacing:0.04em;transition:all 0.2s;box-shadow:0 4px 16px rgba(181,69,27,0.35);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(181,69,27,0.45);}
.err{color:var(--terracota);font-size:0.85rem;margin-top:10px;}

/* ── APP ── */
.app-wrap{display:none;flex-direction:column;min-height:100vh;}
.app-wrap.show{display:flex;}

header{
  background:linear-gradient(135deg,#0f0905 0%,var(--dark) 100%);
  padding:0 28px;display:flex;align-items:stretch;justify-content:space-between;
  border-bottom:3px solid var(--gold);min-height:72px;
}
.hdr-left{display:flex;align-items:center;gap:16px;padding:14px 0;}
.hdr-logo-small{width:44px;height:44px;flex-shrink:0;}
.hdr-texts{}
.hdr-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:700;color:var(--crema);line-height:1;}
.hdr-sub{font-size:0.75rem;color:rgba(253,245,228,0.45);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}

/* Chip vendedor destacado */
.hdr-right{display:flex;align-items:center;gap:14px;padding:14px 0;}
.vendor-chip{
  background:linear-gradient(135deg,var(--gold-d),var(--gold));
  color:#fff;border-radius:50px;padding:8px 20px;
  display:flex;flex-direction:column;align-items:center;
  box-shadow:0 3px 12px rgba(201,136,10,0.4);
}
.vendor-chip-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;opacity:0.85;font-weight:500;}
.vendor-chip-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;line-height:1.1;}
.btn-logout{background:transparent;border:1px solid rgba(253,245,228,0.25);color:rgba(253,245,228,0.65);padding:8px 16px;border-radius:20px;font-family:'Jost',sans-serif;font-size:0.8rem;cursor:pointer;transition:all 0.2s;}
.btn-logout:hover{border-color:var(--terracota-l);color:var(--terracota-l);}

.main{flex:1;padding:28px 20px 60px;max-width:820px;margin:0 auto;width:100%;}

/* Cards */
.selector-card,.comprador-panel,.resumen-card{
  background:#fff;border:1px solid var(--borde);border-radius:16px;
  padding:24px;margin-bottom:22px;box-shadow:0 4px 20px var(--shadow);
}
.card-title{
  font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:700;color:var(--terracota);
  margin-bottom:16px;padding-bottom:10px;
  border-bottom:2px solid var(--crema-d);display:flex;align-items:center;gap:8px;
}
.select-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
select{flex:1;min-width:180px;padding:11px 14px;border:1.5px solid var(--borde);border-radius:8px;font-family:'Jost',sans-serif;font-size:0.95rem;color:var(--dark);background:#fff;outline:none;cursor:pointer;}
select:focus{border-color:var(--gold);}
.btn-sec{padding:11px 20px;background:transparent;border:1.5px solid var(--terracota);color:var(--terracota);border-radius:8px;font-family:'Jost',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.btn-sec:hover{background:rgba(181,69,27,0.08);}
.btn-verde{background:linear-gradient(135deg,var(--verde),#1f5a2e);color:#fff;border:none;padding:11px 20px;border-radius:8px;font-family:'Jost',sans-serif;font-size:0.9rem;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 3px 10px rgba(42,107,60,0.3);transition:all 0.15s;}
.btn-verde:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(42,107,60,0.4);}
.btn-danger{background:transparent;border:1px solid #d44;color:#d44;padding:8px 14px;border-radius:8px;font-family:'Jost',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;transition:background 0.15s;}
.btn-danger:hover{background:rgba(200,60,60,0.08);}

.campo-group{margin-bottom:18px;}
.campo-group label{display:block;font-size:0.76rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-light);margin-bottom:6px;}
.campo-group input{width:100%;padding:11px 15px;border:1.5px solid var(--borde);border-radius:8px;font-family:'Jost',sans-serif;font-size:0.95rem;color:var(--dark);background:#fff;outline:none;transition:border-color 0.15s;}
.campo-group input:focus{border-color:var(--gold);}

.tickets-titulo{font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-light);margin-bottom:10px;}
.ticket-item{background:var(--crema);border:1px solid var(--borde);border-radius:10px;padding:12px 14px;margin-bottom:10px;display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:end;}
.ticket-item label{display:block;font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-light);margin-bottom:4px;}
.ticket-item input{width:100%;padding:8px 10px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Jost',sans-serif;font-size:0.9rem;color:var(--dark);background:#fff;outline:none;transition:border-color 0.15s;}
.ticket-item input:focus{border-color:var(--gold);}
.ticket-item input.error{border-color:#d44;background:#fff5f5;}
.ticket-item select{width:100%;padding:8px 10px;border:1.5px solid var(--borde);border-radius:6px;font-family:'Jost',sans-serif;font-size:0.9rem;color:var(--dark);background:#fff;outline:none;cursor:pointer;}
.ticket-item select:focus{border-color:var(--gold);}
.btn-rm-ticket{background:transparent;border:1px solid #ddd;color:#aaa;border-radius:6px;padding:8px 10px;cursor:pointer;font-size:1rem;line-height:1;transition:all 0.15s;}
.btn-rm-ticket:hover{border-color:#d44;color:#d44;}
.btn-add-ticket{width:100%;padding:10px;background:transparent;border:2px dashed var(--borde);border-radius:8px;color:var(--text-light);font-family:'Jost',sans-serif;font-size:0.88rem;font-weight:500;cursor:pointer;margin-top:4px;margin-bottom:18px;transition:all 0.15s;}
.btn-add-ticket:hover{border-color:var(--gold);color:var(--gold-d);}
.acciones-panel{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;}

/* Resumen table */
.resumen-table{width:100%;border-collapse:collapse;font-size:0.87rem;}
.resumen-table th{background:var(--dark);color:var(--crema);padding:10px 14px;text-align:left;font-family:'Cormorant Garamond',serif;font-size:0.82rem;letter-spacing:0.05em;}
.resumen-table td{padding:9px 14px;border-bottom:1px solid var(--crema-d);color:var(--dark);}
.resumen-table tr:last-child td{border-bottom:none;}
.resumen-table tr:nth-child(even) td{background:var(--crema);}
.resumen-table .num{text-align:right;font-weight:600;}
.total-row-res td{background:linear-gradient(135deg,var(--terracota),var(--terracota-d))!important;font-weight:700;color:#fff!important;}
.empty-res{text-align:center;padding:28px;color:#bbb;font-style:italic;font-size:0.9rem;}

/* Toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:var(--crema);padding:11px 24px;border-radius:50px;font-size:0.87rem;font-weight:600;border:1px solid var(--terracota);opacity:0;transition:transform 0.35s cubic-bezier(.34,1.56,.64,1),opacity 0.35s;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:var(--verde);color:#6fcf97;}
.toast.error{border-color:#d44;color:#ff8a60;}

@media(max-width:520px){
  .ticket-item{grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto;}
  .btn-rm-ticket{grid-column:2;grid-row:2;justify-self:end;}
  .select-row{flex-direction:column;align-items:stretch;}
  .acciones-panel{justify-content:stretch;}
  .acciones-panel button{flex:1;}
  .vendor-chip-name{font-size:0.95rem;}
  header{padding:0 16px;}
  .hdr-left{gap:10px;}
}
</style>
</head>
<body>

<!-- SVG LOGO (reutilizable) -->
<svg style="display:none">
  <symbol id="logo-pastoral" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Círculo exterior -->
    <circle cx="100" cy="100" r="90" stroke="currentColor" stroke-width="4" fill="none"/>
    <!-- Arco dorado -->
    <path d="M 100 12 A 88 88 0 0 1 188 100" stroke="#c9880a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <path d="M 100 188 A 88 88 0 0 1 12 100" stroke="#c9880a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Cruz -->
    <rect x="93" y="20" width="14" height="100" rx="3" fill="currentColor"/>
    <rect x="65" y="44" width="70" height="13" rx="3" fill="currentColor"/>
    <!-- Llama -->
    <path d="M100 125 C95 112 88 108 90 96 C86 104 82 110 85 122 C80 114 84 100 88 92 C84 102 78 115 82 128 C85 140 95 148 100 148 C105 148 115 140 118 128 C122 115 116 102 112 92 C116 100 120 114 115 122 C118 110 114 104 110 96 C112 108 105 112 100 125Z" fill="#c9880a"/>
    <!-- Paloma -->
    <path d="M100 22 C96 18 88 18 86 24 C90 22 94 24 96 28 C94 26 90 26 88 30 C92 28 98 30 100 36 C102 30 108 28 112 30 C110 26 106 26 104 28 C106 24 110 22 114 24 C112 18 104 18 100 22Z" fill="#c9880a"/>
    <!-- Pareja -->
    <circle cx="68" cy="108" r="9" fill="currentColor" opacity="0.85"/>
    <path d="M55 145 C55 130 62 122 68 120 C74 122 81 130 81 145Z" fill="currentColor" opacity="0.85"/>
    <circle cx="82" cy="106" r="8" fill="currentColor" opacity="0.7"/>
    <path d="M70 145 C70 131 76 124 82 122 C88 124 94 131 94 145Z" fill="currentColor" opacity="0.7"/>
    <!-- Casa con corazón -->
    <path d="M120 140 L132 128 L144 140 L144 155 L120 155 Z" stroke="currentColor" stroke-width="3" fill="none" stroke-linejoin="round"/>
    <path d="M127 155 L127 147 L137 147 L137 155" stroke="currentColor" stroke-width="2.5" fill="none"/>
    <path d="M132 138 C132 135 128 133 128 137 C128 140 132 143 132 143 C132 143 136 140 136 137 C136 133 132 135 132 138Z" stroke="#b5451b" stroke-width="1.5" fill="none"/>
  </symbol>
</svg>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <!-- Logo de fondo difuminado -->
  <svg class="login-bg-logo" viewBox="0 0 200 200" fill="none">
    <use href="#logo-pastoral" color="white"/>
  </svg>

  <div class="login-card">
    <svg class="login-logo-svg" viewBox="0 0 200 200" fill="none">
      <use href="#logo-pastoral" color="#1c1208"/>
    </svg>
    <div class="login-titulo">Ventas Empanadas</div>
    <div class="login-sub">Pastoral de Parejas</div>
    <label for="sel-usuario">Seleccioná tu pareja</label>
    <select id="sel-usuario">
      <option value="">— Cargando... —</option>
    </select>
    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div class="app-wrap" id="app-wrap">
  <header>
    <div class="hdr-left">
      <svg class="hdr-logo-small" viewBox="0 0 200 200" fill="none">
        <use href="#logo-pastoral" color="#fdf5e4"/>
      </svg>
      <div class="hdr-texts">
        <div class="hdr-title">Ventas Empanadas</div>
        <div class="hdr-sub">Pastoral de Parejas</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="vendor-chip">
        <span class="vendor-chip-label">Pareja vendedora</span>
        <span class="vendor-chip-name" id="hdr-user">—</span>
      </div>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </header>

  <div class="main">
    <div class="selector-card">
      <div class="card-title">📋 Mis compradores</div>
      <div class="select-row">
        <select id="sel-comprador" onchange="seleccionarComprador()">
          <option value="">— Seleccioná un comprador —</option>
        </select>
        <button class="btn-sec" onclick="nuevoComprador()">＋ Nuevo comprador</button>
      </div>
    </div>

    <div class="comprador-panel" id="panel-comprador" style="display:none;">
      <div class="card-title" id="panel-titulo">📝 Nuevo comprador</div>
      <div class="campo-group">
        <label>Nombre del comprador</label>
        <input type="text" id="inp-nombre" placeholder="Nombre y apellido">
      </div>
      <div class="tickets-titulo">Tickets</div>
      <div id="tickets-container"></div>
      <button class="btn-add-ticket" onclick="agregarTicket()">＋ Agregar ticket</button>
      <div class="acciones-panel">
        <button class="btn-danger" onclick="cancelarEdicion()">Cancelar</button>
        <button id="btn-del-comprador" class="btn-danger" onclick="eliminarCompradorActual()" style="display:none;">🗑 Eliminar comprador</button>
        <button class="btn-verde" onclick="guardarComprador()">✓ Guardar</button>
      </div>
    </div>

    <div class="resumen-card">
      <div class="card-title">📊 Resumen de mis ventas</div>
      <div id="resumen-container"><div class="empty-res">Aún no registraste ventas.</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let usuario='', nombreVendedor='', ventas=[], compradorEditandoId=null, tickets=[];

window.addEventListener('load', async()=>{
  try{
    const res=await fetch('/api/vendedores-lista');
    const lista=await res.json();
    const sel=document.getElementById('sel-usuario');
    sel.innerHTML='<option value="">— Seleccioná tu pareja —</option>';
    lista.forEach(v=>{
      const op=document.createElement('option');
      op.value=v.usuario; op.textContent=v.nombre;
      sel.appendChild(op);
    });
  }catch(e){document.getElementById('sel-usuario').innerHTML='<option value="">Error cargando vendedores</option>';}
});

async function doLogin(){
  const u=document.getElementById('sel-usuario').value;
  if(!u){document.getElementById('login-err').textContent='Seleccioná tu pareja primero.';return;}
  const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario:u})});
  if(!res.ok){document.getElementById('login-err').textContent='Error al ingresar. Consultá al organizador.';return;}
  const data=await res.json();
  usuario=u; nombreVendedor=data.nombre;
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('app-wrap').classList.add('show');
  document.getElementById('hdr-user').textContent=nombreVendedor;
  await cargarVentas();
}

function logout(){
  usuario='';nombreVendedor='';ventas=[];
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('app-wrap').classList.remove('show');
  document.getElementById('sel-usuario').value='';
  document.getElementById('login-err').textContent='';
}

async function cargarVentas(){
  const res=await fetch(`/api/ventas?usuario=${encodeURIComponent(usuario)}`);
  ventas=await res.json();
  actualizarSelector();renderResumen();
}

function actualizarSelector(){
  const sel=document.getElementById('sel-comprador');
  const val=sel.value;
  sel.innerHTML='<option value="">— Seleccioná un comprador —</option>';
  ventas.forEach(v=>{const op=document.createElement('option');op.value=v._id;op.textContent=v.nombre;sel.appendChild(op);});
  if(val) sel.value=val;
}

function seleccionarComprador(){
  const id=document.getElementById('sel-comprador').value;
  if(!id){cerrarPanel();return;}
  const c=ventas.find(v=>v._id===id);
  if(!c) return;
  compradorEditandoId=id;
  document.getElementById('inp-nombre').value=c.nombre;
  tickets=JSON.parse(JSON.stringify(c.tickets));
  document.getElementById('panel-titulo').textContent='✏️ Editando comprador';
  document.getElementById('btn-del-comprador').style.display='inline-block';
  renderTickets();
  document.getElementById('panel-comprador').style.display='block';
}

function nuevoComprador(){
  compradorEditandoId=null;
  document.getElementById('sel-comprador').value='';
  document.getElementById('inp-nombre').value='';
  tickets=[{numero:'',tipo:'docena'}];
  document.getElementById('panel-titulo').textContent='📝 Nuevo comprador';
  document.getElementById('btn-del-comprador').style.display='none';
  renderTickets();
  document.getElementById('panel-comprador').style.display='block';
  document.getElementById('inp-nombre').focus();
}

function cerrarPanel(){document.getElementById('panel-comprador').style.display='none';compradorEditandoId=null;tickets=[];}
function cancelarEdicion(){cerrarPanel();document.getElementById('sel-comprador').value='';}

function agregarTicket(){leerTickets();tickets.push({numero:'',tipo:'docena'});renderTickets();}
function eliminarTicket(idx){leerTickets();tickets.splice(idx,1);if(tickets.length===0)tickets.push({numero:'',tipo:'docena'});renderTickets();}

function leerTickets(){
  const container=document.getElementById('tickets-container');
  const items=container.querySelectorAll('.ticket-item');
  tickets=Array.from(items).map((_,i)=>({
    numero:(document.getElementById(`t-num-${i}`)?.value||'').trim(),
    tipo:document.getElementById(`t-tipo-${i}`)?.value||'docena',
  }));
}

function renderTickets(){
  const c=document.getElementById('tickets-container');
  c.innerHTML='';
  tickets.forEach((t,i)=>{
    const div=document.createElement('div');
    div.className='ticket-item';
    div.innerHTML=`
      <div><label>N° Ticket</label><input type="text" id="t-num-${i}" value="${t.numero}" placeholder="ej: 001"></div>
      <div><label>Tipo</label>
        <select id="t-tipo-${i}">
          <option value="docena" ${(t.tipo||'docena')==='docena'?'selected':''}>Docena — $22.000</option>
          <option value="mediaDocena" ${t.tipo==='mediaDocena'?'selected':''}>Media docena — $13.000</option>
        </select>
      </div>
      <button class="btn-rm-ticket" onclick="eliminarTicket(${i})" title="Quitar">✕</button>`;
    c.appendChild(div);
  });
}

async function guardarComprador(){
  leerTickets();
  const nombre=document.getElementById('inp-nombre').value.trim();
  if(!nombre){showToast('⚠ Ingresá el nombre del comprador','error');return;}
  const ticketsValidos=tickets.filter(t=>t.numero);
  if(ticketsValidos.length===0){showToast('⚠ Agregá al menos un ticket con número','error');return;}
  const numeros=ticketsValidos.map(t=>t.numero).filter(Boolean);
  const numerosUnicos=new Set(numeros);
  if(numerosUnicos.size!==numeros.length){
    showToast('⚠ Hay tickets con el mismo número','error');
    const conteo={};
    numeros.forEach(n=>conteo[n]=(conteo[n]||0)+1);
    tickets.forEach((t,i)=>{const inp=document.getElementById(`t-num-${i}`);if(inp)inp.classList.toggle('error',t.numero&&conteo[t.numero]>1);});
    return;
  }
  const otrosTickets=ventas.filter(v=>v._id!==compradorEditandoId).flatMap(v=>v.tickets.map(t=>t.numero).filter(Boolean));
  const duplicadosGlobales=numeros.filter(n=>otrosTickets.includes(n));
  if(duplicadosGlobales.length>0){
    showToast(`⚠ Ticket/s duplicado/s: ${duplicadosGlobales.join(', ')}`,'error');
    tickets.forEach((t,i)=>{const inp=document.getElementById(`t-num-${i}`);if(inp)inp.classList.toggle('error',duplicadosGlobales.includes(t.numero));});
    return;
  }
  const res=await fetch('/api/ventas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario,comprador:{id:compradorEditandoId||null,nombre,tickets:ticketsValidos}})});
  if(res.ok){showToast('✓ Guardado correctamente','ok');cerrarPanel();await cargarVentas();}
  else showToast('❌ Error al guardar','error');
}

async function eliminarCompradorActual(){
  if(!compradorEditandoId) return;
  if(!confirm('¿Eliminar este comprador y todas sus ventas? No se puede deshacer.')) return;
  const res=await fetch('/api/ventas',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario,id:compradorEditandoId})});
  if(res.ok){showToast('✓ Comprador eliminado','ok');cerrarPanel();document.getElementById('sel-comprador').value='';await cargarVentas();}
  else showToast('❌ Error al eliminar','error');
}

function renderResumen(){
  const c=document.getElementById('resumen-container');
  if(ventas.length===0){c.innerHTML='<div class="empty-res">Aún no registraste ventas.</div>';return;}
  let totalDoc=0,totalMed=0;
  let html=`<table class="resumen-table"><thead><tr><th>Comprador</th><th>Tickets</th><th class="num">Docenas</th><th class="num">Medias doc.</th></tr></thead><tbody>`;
  ventas.forEach(v=>{
    const doc=v.tickets.filter(t=>t.tipo==='docena'||(!t.tipo&&t.docenas>0)).length;
    const med=v.tickets.filter(t=>t.tipo==='mediaDocena'||(t.mediaDocenas>0)).length;
    const nums=v.tickets.map(t=>t.numero).filter(Boolean).join(', ');
    totalDoc+=doc;totalMed+=med;
    html+=`<tr><td>${v.nombre}</td><td style="font-size:0.82rem;color:var(--text-light)">${nums||'—'}</td><td class="num">${doc||'—'}</td><td class="num">${med||'—'}</td></tr>`;
  });
  html+=`<tr class="total-row-res"><td colspan="2"><strong>TOTAL</strong></td><td class="num">${totalDoc}</td><td class="num">${totalMed}</td></tr></tbody></table>`;
  c.innerHTML=html;
}

function showToast(msg,tipo=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(tipo?' '+tipo:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}
</script>
