<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Empanadas Pastoral</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--terracota:#b5451b;--terracota-d:#8c3314;--terracota-l:#e8876a;--crema:#fdf5e4;--crema-d:#f0e2c4;--dark:#1c1208;--dark-mid:#2e1f0e;--verde:#2a6b3c;--borde:#dcc89a;--shadow:rgba(28,18,8,0.12);--text:#2e1f0e;--text-light:#8a6a40;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',sans-serif;background:var(--dark);color:#fff;min-height:100vh;display:flex;flex-direction:column;}
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--crema);color:var(--text);border-radius:20px;padding:48px 40px;width:100%;max-width:380px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.5);}
.login-card h1{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--terracota);margin-bottom:6px;}
.login-card p{font-size:0.8rem;color:var(--text-light);margin-bottom:28px;text-transform:uppercase;letter-spacing:0.08em;}
.login-card input{width:100%;padding:12px 16px;border:1.5px solid var(--borde);border-radius:8px;font-family:'Jost',sans-serif;font-size:1rem;color:var(--dark);outline:none;margin-bottom:14px;}
.login-card input:focus{border-color:var(--terracota);}
.btn-p{width:100%;padding:13px;background:var(--terracota);color:#fff;border:none;border-radius:8px;font-family:'Jost',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;}
.btn-p:hover{background:var(--terracota-d);}
.err{color:var(--terracota);font-size:0.85rem;margin-top:8px;}

.admin-wrap{display:none;flex-direction:column;min-height:100vh;background:var(--crema);color:var(--text);}
.admin-wrap.show{display:flex;}
header{background:var(--dark);padding:18px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border-bottom:3px solid var(--terracota);}
header h1{font-family:'Cormorant Garamond',serif;font-size:1.5rem;color:var(--crema);}
.hbtns{display:flex;gap:10px;flex-wrap:wrap;}
.btn-hdr{padding:10px 22px;border-radius:50px;font-family:'Jost',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-export{background:linear-gradient(135deg,var(--verde),#1a5229);color:#fff;border:none;box-shadow:0 4px 14px rgba(42,107,60,0.4);}
.btn-refresh{background:transparent;border:1.5px solid rgba(253,245,228,0.4);color:rgba(253,245,228,0.8);}
.btn-refresh:hover{border-color:var(--terracota-l);}

.body{padding:28px 20px 60px;max-width:1200px;margin:0 auto;width:100%;}
.tabs{display:flex;gap:4px;margin-bottom:24px;background:#fff;border:1px solid var(--borde);border-radius:12px;padding:4px;}
.tab{flex:1;padding:10px;text-align:center;border:none;border-radius:8px;font-family:'Jost',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;color:var(--text-light);background:transparent;}
.tab.active{background:var(--terracota);color:#fff;font-weight:600;}

.section{display:none;} .section.show{display:block;}

.stats-grid-top{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;}
.stats-grid-bottom{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
@media(max-width:700px){.stats-grid-top{grid-template-columns:repeat(2,1fr);}.stats-grid-bottom{grid-template-columns:repeat(1,1fr);}}
.stat{background:#fff;border:1px solid var(--borde);border-radius:12px;padding:20px;text-align:center;box-shadow:0 2px 10px var(--shadow);}
.stat .n{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:700;color:var(--terracota);}
.stat .l{font-size:0.75rem;color:var(--text-light);text-transform:uppercase;letter-spacing:0.06em;margin-top:3px;}

.card{background:#fff;border:1px solid var(--borde);border-radius:14px;padding:22px;margin-bottom:20px;box-shadow:0 3px 14px var(--shadow);}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--terracota);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--crema-d);}

table{width:100%;border-collapse:collapse;font-size:0.85rem;}
th{background:var(--dark);color:var(--crema);padding:10px 14px;text-align:left;font-family:'Cormorant Garamond',serif;font-size:0.8rem;letter-spacing:0.05em;white-space:nowrap;}
td{padding:9px 14px;border-bottom:1px solid var(--crema-d);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:nth-child(even) td{background:var(--crema);}
.num{text-align:right;font-weight:600;}
.money{text-align:right;font-weight:600;color:var(--verde);}
.total-row td{background:rgba(181,69,27,0.1)!important;font-weight:700;color:var(--terracota-d);}
.table-wrap{overflow-x:auto;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px var(--shadow);}
.empty{text-align:center;padding:28px;color:#bbb;font-style:italic;}

/* Gestión vendedores */
.vendedor-form{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
.vendedor-form input{flex:1;min-width:150px;padding:10px 14px;border:1.5px solid var(--borde);border-radius:8px;font-family:'Jost',sans-serif;font-size:0.9rem;color:var(--dark);outline:none;}
.vendedor-form input:focus{border-color:var(--terracota);}
.btn-sm{padding:10px 18px;border-radius:8px;font-family:'Jost',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-add{background:var(--terracota);color:#fff;border:none;}
.btn-add:hover{background:var(--terracota-d);}
.btn-del-v{background:transparent;border:1px solid #d44;color:#d44;border-radius:6px;padding:4px 12px;font-size:0.8rem;cursor:pointer;}
.btn-del-v:hover{background:rgba(200,60,60,0.08);}

.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:var(--crema);padding:11px 24px;border-radius:50px;font-size:0.87rem;font-weight:600;border:1px solid var(--terracota);opacity:0;transition:transform 0.35s cubic-bezier(.34,1.56,.64,1),opacity 0.35s;z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:var(--verde);}
.toast.error{border-color:#d44;color:#ff8a60;}
</style>
</head>
<body>

<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h1>🔐 Admin</h1>
    <p>Empanadas — Pastoral de Parejas</p>
    <input type="password" id="pw-inp" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-p" onclick="login()">Ingresar</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<div class="admin-wrap" id="admin-wrap">
  <header>
    <h1>📊 Panel Admin — Empanadas</h1>
    <div class="hbtns">
      <button class="btn-hdr btn-refresh" onclick="recargar()">↻ Actualizar</button>
      <button class="btn-hdr btn-export" onclick="exportar()">⬇ Exportar Excel</button>
    </div>
  </header>

  <div class="body">
    <div class="tabs">
      <button class="tab active" onclick="cambiarTab('ventas')">📋 Ventas</button>
      <button class="tab" onclick="cambiarTab('tickets')">🎫 Por Ticket</button>
      <button class="tab" onclick="cambiarTab('vendedores')">👥 Vendedores</button>
    </div>

    <!-- TAB VENTAS -->
    <div class="section show" id="tab-ventas">
      <div id="stats-grid"></div>
      <div class="card">
        <div class="card-title">Detalle por vendedor</div>
        <div class="table-wrap"><div id="tabla-ventas"></div></div>
      </div>
      <div class="card">
        <div class="card-title">Resumen financiero por vendedor</div>
        <div class="table-wrap"><div id="tabla-finanzas"></div></div>
      </div>
    </div>

    <!-- TAB TICKETS -->
    <div class="section" id="tab-tickets">
      <div class="card">
        <div class="card-title">Todos los tickets registrados (orden numérico)</div>
        <div class="table-wrap"><div id="tabla-tickets"></div></div>
      </div>
    </div>

    <!-- TAB VENDEDORES -->
    <div class="section" id="tab-vendedores">
      <div class="card">
        <div class="card-title">Agregar nuevo vendedor</div>
        <div class="vendedor-form">
          <input type="text" id="inp-usuario" placeholder="Usuario (ej: virgiymartin)">
          <input type="text" id="inp-nombre" placeholder="Nombre visible (ej: Virgi y Martín)">
          <button class="btn-sm btn-add" onclick="agregarVendedor()">＋ Agregar</button>
        </div>
        <p style="font-size:0.8rem;color:var(--text-light)">⚠ El usuario y la contraseña serán idénticos. Recordá comunicárselo al vendedor.</p>
      </div>
      <div class="card">
        <div class="card-title">Vendedores registrados</div>
        <div class="table-wrap"><div id="tabla-vendedores"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let pw = '';
let datosVentas = [];
let PRECIO_DOCENA=22000,PRECIO_MEDIA=13000,GANANCIA_DOCENA=4000,GANANCIA_MEDIA=3000;
let COSTO_DOCENA=PRECIO_DOCENA-GANANCIA_DOCENA,COSTO_MEDIA=PRECIO_MEDIA-GANANCIA_MEDIA;

function fmt(n){return '$'+n.toLocaleString('es-AR');}

async function login(){
  pw=document.getElementById('pw-inp').value;
  const res=await fetch(`/api/admin/ventas?password=${encodeURIComponent(pw)}`);
  if(res.status===401){document.getElementById('login-err').textContent='Contraseña incorrecta';return;}
  datosVentas=await res.json();
  document.getElementById('login-wrap').style.display='none';
  document.getElementById('admin-wrap').classList.add('show');
  renderAll();
}

async function recargar(){
  const res=await fetch(`/api/admin/ventas?password=${encodeURIComponent(pw)}`);
  datosVentas=await res.json();
  renderAll();
  showToast('✓ Actualizado','ok');
}

function cambiarTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['ventas','tickets','vendedores'][i]===t);});
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('show'));
  document.getElementById('tab-'+t).classList.add('show');
  if(t==='vendedores') cargarVendedores();
}

function renderAll(){
  renderStats();
  renderVentas();
  renderTickets();
}

function renderStats(){
  const totalVendedores=datosVentas.filter(v=>v.compradores.length>0).length;
  const totalCompradores=datosVentas.reduce((s,v)=>s+v.compradores.length,0);
  const totalDocenas=datosVentas.reduce((s,v)=>s+v.totalDocenas,0);
  const totalMedias=datosVentas.reduce((s,v)=>s+v.totalMedias,0);
  const totalRec=datosVentas.reduce((s,v)=>s+v.totalRecaudado,0);
  const totalGan=datosVentas.reduce((s,v)=>s+v.totalGanancia,0);
  const totalProv=datosVentas.reduce((s,v)=>s+v.totalProveedor,0);
  document.getElementById('stats-grid').innerHTML=`
    <div class="stats-grid-top">
      <div class="stat"><div class="n">${totalVendedores}</div><div class="l">Vendedores activos</div></div>
      <div class="stat"><div class="n">${totalCompradores}</div><div class="l">Compradores</div></div>
      <div class="stat"><div class="n">${totalDocenas}</div><div class="l">Docenas</div></div>
      <div class="stat"><div class="n">${totalMedias}</div><div class="l">Medias docenas</div></div>
    </div>
    <div class="stats-grid-bottom">
      <div class="stat"><div class="n" style="font-size:1.3rem">${fmt(totalRec)}</div><div class="l">Total recaudado</div></div>
      <div class="stat"><div class="n" style="font-size:1.3rem;color:var(--verde)">${fmt(totalGan)}</div><div class="l">Ganancia pastoral</div></div>
      <div class="stat"><div class="n" style="font-size:1.3rem;color:#b07020">${fmt(totalProv)}</div><div class="l">Pago proveedor</div></div>
    </div>
  `;
}

function renderVentas(){
  // Detalle
  let html=`<table><thead><tr><th>Vendedor</th><th>Comprador</th><th>Tickets</th><th class="num">Docenas</th><th class="num">Medias doc.</th></tr></thead><tbody>`;
  let totDoc=0,totMed=0;
  datosVentas.forEach(v=>{
    if(v.compradores.length===0) return;
    v.compradores.forEach(c=>{
      const doc=c.tickets.filter(t=>t.tipo==='docena'||(!t.tipo&&(t.docenas||0)>0)).length;
      const med=c.tickets.filter(t=>t.tipo==='mediaDocena'||(t.mediaDocenas||0)>0).length;
      const nums=c.tickets.map(t=>t.numero).filter(Boolean).join(', ');
      totDoc+=doc;totMed+=med;
      html+=`<tr><td><span style="background:var(--dark);color:var(--crema-d);padding:2px 8px;border-radius:12px;font-size:0.75rem">${v.nombre}</span></td>
        <td>${c.nombre}</td><td style="font-size:0.8rem;color:var(--text-light)">${nums||'—'}</td>
        <td class="num">${doc||'—'}</td><td class="num">${med||'—'}</td></tr>`;
    });
  });
  html+=`<tr class="total-row"><td colspan="3">TOTAL</td><td class="num">${totDoc}</td><td class="num">${totMed}</td></tr></tbody></table>`;
  document.getElementById('tabla-ventas').innerHTML = datosVentas.some(v=>v.compradores.length>0) ? html : '<div class="empty">Sin ventas registradas.</div>';

  // Finanzas
  let html2=`<table><thead><tr><th>Vendedor</th><th class="num">Docenas</th><th class="num">Medias</th><th class="money">Total Recaudado</th><th class="money">Ganancia Pastoral</th><th class="money">Pago Proveedor</th></tr></thead><tbody>`;
  let sRec=0,sGan=0,sProv=0;
  datosVentas.forEach(v=>{
    sRec+=v.totalRecaudado;sGan+=v.totalGanancia;sProv+=v.totalProveedor;
    html2+=`<tr><td>${v.nombre}</td><td class="num">${v.totalDocenas||'—'}</td><td class="num">${v.totalMedias||'—'}</td><td class="money">${fmt(v.totalRecaudado)}</td><td class="money" style="color:var(--verde)">${fmt(v.totalGanancia)}</td><td class="money" style="color:#b07020">${fmt(v.totalProveedor)}</td></tr>`;
  });
  html2+=`<tr class="total-row"><td>TOTAL</td><td></td><td></td><td class="money">${fmt(sRec)}</td><td class="money">${fmt(sGan)}</td><td class="money">${fmt(sProv)}</td></tr></tbody></table>`;
  document.getElementById('tabla-finanzas').innerHTML=html2;
}

function renderTickets(){
  const todos=[];
  datosVentas.forEach(v=>{
    v.compradores.forEach(c=>{
      c.tickets.forEach(t=>{
        const esDocena=t.tipo==='docena'||(!t.tipo&&(t.docenas||0)>0);
        todos.push({numero:t.numero,vendedor:v.nombre,comprador:c.nombre,tipo:esDocena?'Docena':'Media docena',precio:esDocena?PRECIO_DOCENA:PRECIO_MEDIA});
      });
    });
  });
  todos.sort((a,b)=>String(a.numero).localeCompare(String(b.numero),undefined,{numeric:true}));
  if(todos.length===0){document.getElementById('tabla-tickets').innerHTML='<div class="empty">Sin tickets registrados.</div>';return;}
  let html=`<table><thead><tr><th>N° Ticket</th><th>Vendedor</th><th>Comprador</th><th>Tipo</th><th class="money">Precio</th></tr></thead><tbody>`;
  todos.forEach(t=>{
    html+=`<tr><td><strong>${t.numero||'—'}</strong></td><td>${t.vendedor}</td><td>${t.comprador}</td><td>${t.tipo}</td><td class="money">${fmt(t.precio)}</td></tr>`;
  });
  html+=`</tbody></table>`;
  document.getElementById('tabla-tickets').innerHTML=html;
}

async function cargarVendedores(){
  const res=await fetch(`/api/admin/vendedores?password=${encodeURIComponent(pw)}`);
  const vendedores=await res.json();
  if(vendedores.length===0){document.getElementById('tabla-vendedores').innerHTML='<div class="empty">Sin vendedores cargados.</div>';return;}
  let html=`<table><thead><tr><th>Usuario</th><th>Nombre visible</th><th>Contraseña</th><th>Acción</th></tr></thead><tbody>`;
  vendedores.forEach(v=>{
    html+=`<tr><td><code>${v.usuario}</code></td><td>${v.nombre}</td><td><code>${v.usuario}</code></td><td><button class="btn-del-v" onclick="eliminarVendedor('${v.usuario}','${v.nombre}')">🗑 Eliminar</button></td></tr>`;
  });
  html+=`</tbody></table>`;
  document.getElementById('tabla-vendedores').innerHTML=html;
}

async function agregarVendedor(){
  const usuario=document.getElementById('inp-usuario').value.trim().toLowerCase();
  const nombre=document.getElementById('inp-nombre').value.trim();
  if(!usuario||!nombre){showToast('⚠ Completá usuario y nombre','error');return;}
  const res=await fetch('/api/admin/vendedores',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw,usuario,nombre})});
  if(res.status===409){showToast('⚠ Ese usuario ya existe','error');return;}
  if(res.ok){
    document.getElementById('inp-usuario').value='';
    document.getElementById('inp-nombre').value='';
    showToast('✓ Vendedor agregado','ok');
    cargarVendedores();
  }
}

async function eliminarVendedor(usuario,nombre){
  if(!confirm(`¿Eliminar a "${nombre}" y todas sus ventas? No se puede deshacer.`)) return;
  const res=await fetch('/api/admin/vendedores',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw,usuario})});
  if(res.ok){showToast('✓ Vendedor eliminado','ok');cargarVendedores();recargar();}
  else showToast('❌ Error al eliminar','error');
}

function exportar(){window.location.href=`/api/admin/exportar?password=${encodeURIComponent(pw)}`;}

function showToast(msg,tipo=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(tipo?' '+tipo:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}
</script>
</body>
</html>
